---
name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  opencode:
    if: |
      (github.event_name == 'issue_comment' &&
        (contains(github.event.comment.body, '/oc') ||
         contains(github.event.comment.body, '/opencode'))) ||
      (github.event_name == 'pull_request_review_comment' &&
        (contains(github.event.comment.body, '/oc') ||
         contains(github.event.comment.body, '/opencode')))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Run OpenCode
        uses: anomalyco/opencode/github@v1.15.10
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_AI_API_KEY }}
        with:
          model: nvidia/z-ai/glm-5.1
          # share: true
          # github_token: xxxx

  review-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Review PR
        uses: anomalyco/opencode/github@v1.15.10
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_AI_API_KEY }}
        with:
          model: nvidia/z-ai/glm-5.1
          prompt: |
            Review this pull request thoroughly. Analyze the diff for bugs,
            logic errors, type mismatches, missing edge cases, and style
            violations. Propose concrete improvements where reasonable. If
            the PR is clean, say so — but be critical by default. Reference
            AGENTS.md for project conventions before flagging anything as
            a violation.

  triage-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Investigate Issue
        uses: anomalyco/opencode/github@v1.15.10
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_AI_API_KEY }}
        with:
          model: nvidia/z-ai/glm-5.1
          prompt: |
            Investigate this issue thoroughly. Search the codebase for
            relevant code, trace the root cause, and gather as much
            context as possible. Ask clarifying questions if the issue
            lacks reproduction steps, version info, or expected vs
            actual behavior. Propose a fix strategy if the root cause
            is identifiable. Reference AGENTS.md for project conventions.
