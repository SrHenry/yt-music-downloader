---
name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, ready_for_review]

jobs:
  opencode:
    if: |
      (github.event_name == 'issue_comment' &&
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))) ||
      (github.event_name == 'pull_request_review_comment' &&
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')))
    uses: ./.github/workflows/opencode-retry.yml
    with:
      persist-credentials: true
    secrets: inherit

  review-pr:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    uses: ./.github/workflows/opencode-retry.yml
    with:
      persist-credentials: false
      prompt: |
        Review this pull request thoroughly. Analyze the diff for bugs,
        logic errors, type mismatches, missing edge cases, and style
        violations. Propose concrete improvements where reasonable. If
        the PR is clean, say so — but be critical by default. Reference
        AGENTS.md for project conventions before flagging anything as
        a violation.
    secrets: inherit

  triage-issue:
    if: github.event_name == 'issues'
    uses: ./.github/workflows/opencode-retry.yml
    with:
      persist-credentials: false
      prompt: |
        Investigate this issue thoroughly. Search the codebase for
        relevant code, trace the root cause, and gather as much
        context as possible. Ask clarifying questions if the issue
        lacks reproduction steps, version info, or expected vs
        actual behavior. Propose a fix strategy if the root cause
        is identifiable. Reference AGENTS.md for project conventions.
    secrets: inherit
