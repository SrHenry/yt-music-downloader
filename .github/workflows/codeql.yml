---
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    # NOTE: Fork PRs cannot upload SARIF (GITHUB_TOKEN is read-only).
    # Use pull_request_target if external contributor scanning is needed.
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        if: ${{ matrix.build-mode == '' }}
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Initialize CodeQL (with build-mode)
        uses: github/codeql-action/init@v4
        if: ${{ matrix.build-mode != '' }}
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
          filter-mode: >-
            ${{ github.event_name == 'pull_request' && 'diff' || 'default' }}
