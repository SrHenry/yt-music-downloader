---
name: opencode-retry

on:
  workflow_call:
    inputs:
      persist-credentials:
        type: boolean
        default: false
      prompt:
        type: string
        default: ''
      max-attempts:
        type: number
        default: 6

permissions:
  id-token: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: ${{ inputs.persist-credentials }}

    - name: Run OpenCode (attempt ${{ github.run_attempt }}/${{ inputs.max-attempts }})
      uses: anomalyco/opencode/github@v1.15.10
      env:
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_AI_API_KEY }}
      with:
        model: nvidia/z-ai/glm-5.1
        prompt: ${{ inputs.prompt }}

    - name: Retry on failure
      if: failure() && github.run_attempt < inputs.max-attempts
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        ATTEMPT=${{ github.run_attempt }}
        if [ "$ATTEMPT" -le 2 ]; then
          DELAY=0
        else
          DELAY=$(( 10 * (2 ** (ATTEMPT - 3)) ))
        fi
        if [ "$DELAY" -gt 0 ]; then
          echo "Exponential backoff: waiting ${DELAY}s before retry..."
          sleep "$DELAY"
        fi
        gh run rerun ${{ github.run_id }} --failed
