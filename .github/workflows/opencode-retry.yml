---
name: opencode-retry

on:
  workflow_call:
    inputs:
      persist-credentials:
        type: boolean
        default: false
      prompt:
        type: string
        default: ''
      max-attempts:
        type: number
        default: 6

permissions:
  id-token: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: ${{ inputs.persist-credentials }}

    - name: Run OpenCode (attempt ${{ github.run_attempt }}/${{ inputs.max-attempts }})
      uses: anomalyco/opencode/github@v1.15.10
      env:
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_AI_API_KEY }}
      with:
        model: nvidia/z-ai/glm-5.1
        prompt: ${{ inputs.prompt }}

    - name: Retry on failure
      if: failure() && github.run_attempt < inputs.max-attempts
      uses: actions/github-script@v7
      with:
        script: |
          const delay = github.run_attempt <= 2 ? 0 : Math.pow(2, github.run_attempt - 2) * 10
          if (delay > 0) {
            core.info(`Exponential backoff: waiting ${delay}s before retry...`)
            await new Promise(r => setTimeout(r, delay * 1000))
          }
          await github.rest.actions.rerunWorkflowFailedJobs({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId
          })
